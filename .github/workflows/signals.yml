name: Generate trading signal

on:
  schedule:
    - cron: "5 */4 * * *" # every 4 hours at :05 (UTC)
  workflow_dispatch: {} # manual "Run workflow" button

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate signal from live 4H candles
        run: node scripts/generate-signal.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "chartpulse-bot"
          git config user.email "actions@github.com"
          git add api/_signals.json server/data/signals.json
          git diff --cached --quiet || git commit -m "signal: automated 4H update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
